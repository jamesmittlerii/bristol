name: Bristol Vox LV2

on:
  push:
    paths:
      - 'lv2/bristol-vox/**'
      - 'bristol/**'
      - 'libbristol/**'
      - 'include/**'
      - '.github/workflows/bristol-vox-lv2.yml'
  pull_request:
    paths:
      - 'lv2/bristol-vox/**'
      - 'bristol/**'
      - 'libbristol/**'
      - 'include/**'
      - '.github/workflows/bristol-vox-lv2.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: lv2/bristol-vox

jobs:
  build-linux-arm64:
    name: Linux ARM64 (Raspberry Pi target)
    runs-on: ubuntu-24.04-arm
    # Match Raspberry Pi OS / Debian Bookworm glibc (2.36). Ubuntu 24.04 needs GLIBC_2.38+.
    container: debian:bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential pkg-config lv2-dev file

      - name: Build
        run: make clean && make

      - name: Verify bundle
        run: |
          file bristol-vox.lv2/bristol-vox | grep -F 'ARM aarch64'
          grep -F 'lv2:binary <bristol-vox>' bristol-vox.lv2/manifest.ttl

      - name: Test
        run: make test

      - name: Upload LV2 bundle
        uses: actions/upload-artifact@v4
        with:
          name: bristol-vox-lv2-linux-arm64
          path: |
            lv2/bristol-vox/bristol-vox.lv2/bristol-vox
            lv2/bristol-vox/bristol-vox.lv2/manifest.ttl
          if-no-files-found: error
