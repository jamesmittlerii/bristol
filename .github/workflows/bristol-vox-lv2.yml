name: Bristol Vox LV2

on:
  push:
    paths:
      - 'lv2/bristol-vox/**'
      - 'bristol/**'
      - 'libbristol/**'
      - 'include/**'
      - '.github/workflows/bristol-vox-lv2.yml'
  pull_request:
    paths:
      - 'lv2/bristol-vox/**'
      - 'bristol/**'
      - 'libbristol/**'
      - 'include/**'
      - '.github/workflows/bristol-vox-lv2.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: lv2/bristol-vox

jobs:
  build-linux-arm64:
    name: Linux ARM64 (Raspberry Pi target)
    runs-on: ubuntu-24.04-arm
    # Match Raspberry Pi OS / Debian Bookworm glibc (2.36). Ubuntu 24.04 needs GLIBC_2.38+.
    container: debian:bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential pkg-config lv2-dev file zip

      - name: Build
        run: make clean && make

      - name: Verify bundle
        run: |
          file bristol-vox.lv2/bristol-vox.so | grep -F 'ARM aarch64'
          grep -F 'lv2:binary <bristol-vox.so>' bristol-vox.lv2/manifest.ttl
          test -d bristol-vox.lv2
          ls -la bristol-vox.lv2/

      - name: Test
        run: make test

      - name: Package release artifact
        working-directory: ${{ github.workspace }}
        run: |
          set -eux
          RELEASE_DIR=dist/bristol-vox-lv2-linux-arm64
          STAGE_DIR=dist/stage/bristol-vox.lv2
          ZIP_NAME=bristol-vox-lv2-linux-arm64.zip
          rm -rf dist
          mkdir -p "$RELEASE_DIR" "$STAGE_DIR"
          cp lv2/bristol-vox/bristol-vox.lv2/bristol-vox.so "$STAGE_DIR/"
          cp lv2/bristol-vox/bristol-vox.lv2/manifest.ttl "$STAGE_DIR/"
          (cd dist/stage && zip -r "$GITHUB_WORKSPACE/$RELEASE_DIR/$ZIP_NAME" bristol-vox.lv2/)
          (cd "$RELEASE_DIR" && sha256sum "$ZIP_NAME" > sha256sums.txt)
          zip -sf "$RELEASE_DIR/$ZIP_NAME"

      - name: Upload release
        uses: actions/upload-artifact@v4
        with:
          name: bristol-vox-lv2-linux-arm64
          path: dist/bristol-vox-lv2-linux-arm64/
          if-no-files-found: error
